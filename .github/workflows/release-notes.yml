name: Generate Release Notes

on:
  push:
    branches:
      - main
      - "release/**"
      - "hotfix/**"
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/**"
      - "hotfix/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Override deploy environment (e.g. staging, production, hotfix)"
        required: false
        type: string
      personas:
        description: "Comma-separated persona override (e.g. executive,end-user)"
        required: false
        type: string

concurrency:
  group: shipsignal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-release-notes:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: action/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: action

      - name: Build TypeScript
        run: npm run build
        working-directory: action

      - name: Detect deploy environment
        id: env-detect
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == hotfix/* ]]; then
            echo "environment=hotfix" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == release/* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        env:
          # AI provider key — set whichever your team uses as AI_API_KEY
          # Secret management options:
          #   1. Repo-level:  Settings > Secrets and variables > Actions
          #   2. Org-level:   Org Settings > Secrets (shared across all repos)
          #   3. Environment: Settings > Environments (scoped to staging/production)
          #   4. External:    Vault, AWS Secrets Manager, Azure Key Vault, etc.
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          # GitHub Copilot Enterprise: use GITHUB_TOKEN if your org grants Copilot API access
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          DEPLOY_ENVIRONMENT: ${{ steps.env-detect.outputs.environment }}
          PERSONA_OVERRIDE: ${{ github.event.inputs.personas }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_REF_NAME: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node dist/index.js
        working-directory: action

      - name: Commit generated release notes
        run: |
          git config user.name "ShipSignal[bot]"
          git config user.email "ShipSignal[bot]@users.noreply.github.com"
          git add release-notes/
          if git diff --staged --quiet; then
            echo "No new release notes generated."
          else
            git commit -m "chore(release-notes): generate notes for ${GITHUB_SHA::8}"
            git push
          fi
