name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: action/package-lock.json

      - name: Install dependencies
        working-directory: action
        run: npm ci

      - name: Typecheck
        working-directory: action
        run: npm run typecheck

      - name: Lint
        working-directory: action
        run: npm run lint
